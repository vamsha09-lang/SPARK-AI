<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00054c">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spark AI</title>
  <style>
    :root {
      --bg: #00054c;
      --card: #020617;
      --text: #ffffff;
      --user: #2563eb;
      --bot: #1e293b;
      --accent: #3b82f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: var(--text);
    }

    /* ===== LOGIN ===== */
    #login {
      background: var(--card);
      padding: 30px;
      width: 320px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 0 25px rgba(0,0,0,.5);
    }
    #login h2 { margin-bottom: 20px; }
    #login input {
      width: 100%; padding: 10px; margin: 8px 0;
      border-radius: 8px; border: none; outline: none;
    }
    #login button {
      width: 100%; padding: 10px; background: #2563eb;
      color: white; border: none; border-radius: 8px;
      cursor: pointer; font-size: 16px;
    }
    #error { color: #ff6b6b; font-size: 12px; margin-top: 8px; }

    /* ===== APP ===== */
    #app {
      display: none;
      width: 97vw;
      max-width: 1000px;
      height: 95vh;
      border-radius: 18px;
      overflow: hidden;
      flex-direction: row;
      box-shadow: 0 0 30px rgba(0,0,0,.7);
    }

    /* ===== SIDEBAR ===== */
    #sidebar {
      width: 260px;
      background: #010b2e;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #0f2060;
      flex-shrink: 0;
    }
    #sidebar-header {
      padding: 14px 12px 10px;
      font-size: 11px;
      color: #94a3b8;
      letter-spacing: .04em;
      text-transform: uppercase;
      border-bottom: 1px solid #0f2060;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #newChatBtn {
      background: var(--accent);
      border: none;
      color: white;
      border-radius: 7px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      font-weight: bold;
    }
    #newChatBtn:hover { background: #1d4ed8; }
    #history-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 6px;
    }
    .history-item {
      padding: 9px 10px;
      border-radius: 9px;
      cursor: pointer;
      font-size: 13px;
      color: #cbd5e1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      margin-bottom: 3px;
      transition: background .15s;
    }
    .history-item:hover { background: #0f2060; }
    .history-item.active { background: #1e3a8a; color: white; }
    .history-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-date { font-size: 10px; color: #475569; white-space: nowrap; }
    .del-btn {
      background: none;
      border: none;
      color: #475569;
      cursor: pointer;
      font-size: 13px;
      padding: 0 2px;
      flex-shrink: 0;
    }
    .del-btn:hover { color: #f87171; }
    #sidebar-footer {
      padding: 10px;
      border-top: 1px solid #0f2060;
    }
    #clearAllBtn {
      width: 100%;
      padding: 7px;
      background: transparent;
      border: 1px solid #1e3a8a;
      color: #64748b;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
    }
    #clearAllBtn:hover { border-color: #ef4444; color: #ef4444; }

    /* ===== MAIN ===== */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
      color: #0f172a;
      min-width: 0;
    }
    header {
      background: linear-gradient(90deg, #00054c, #020617);
      color: white;
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
      flex-shrink: 0;
    }
    #chat-title-display {
      font-size: 13px;
      color: #94a3b8;
      font-weight: normal;
      max-width: 280px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    header button {
      background: none; border: none;
      color: white; font-size: 18px; cursor: pointer;
    }

    /* ===== MESSAGES ===== */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      background: #f8fafc;
    }
    .msg {
      margin: 10px 0;
      padding: 10px 12px;
      border-radius: 12px;
      max-width: 75%;
      display: flex;
      align-items: center;
      gap: 6px;
      line-height: 1.4;
      font-size: 14px;
      word-break: break-word;
    }
    .user {
      background: var(--user);
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 3px;
    }
    .bot {
      background: var(--bot);
      color: white;
      border-bottom-left-radius: 3px;
    }
    .msg button {
      font-size: 11px;
      padding: 2px 6px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: rgba(255,255,255,.15);
      color: white;
      flex-shrink: 0;
    }
    .msg button:hover { background: rgba(255,255,255,.25); }

    /* ===== FOOTER ===== */
    footer {
      display: flex;
      gap: 6px;
      padding: 8px;
      border-top: 1px solid #e2e8f0;
      background: white;
      flex-shrink: 0;
    }
    footer input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      outline: none;
      font-size: 14px;
      color: #0f172a;
    }
    footer input:focus { border-color: var(--accent); }
    footer button {
      padding: 0 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }
    footer button:hover { background: #1d4ed8; }

    #history-list::-webkit-scrollbar,
    #messages::-webkit-scrollbar { width: 4px; }
    #history-list::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    @media (max-width: 600px) {
      #sidebar { width: 180px; }
      #app { width: 100vw; height: 100vh; border-radius: 0; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <h2>⚡ Spark AI</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <button onclick="window.location='/auth/google'">
🔵 Login with Google
</button>
  <p id="error"></p>
</div>

<!-- APP -->
<div id="app">

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <span>💬 Chats</span>
      <button id="newChatBtn">+ New</button>
    </div>
    <div id="history-list"></div>
    <div id="sidebar-footer">
      <button id="clearAllBtn">🗑️ Clear all history</button>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <header>
      <div>
        <div>⚡ Spark AI</div>
        <div id="chat-title-display"></div>
      </div>
      <button id="clearBtn">🗑️</button>
    </header>

    <div id="messages"></div>

    <footer>
      <button id="uploadBtn">📎</button>
      <input type="file" id="fileInput" hidden>
      <input id="input" placeholder="Type your message...">
      <button id="send">➤</button>
      <button id="mic">🎤</button>
    </footer>
  </div>

</div>

<script>
const STORAGE_KEY = "spark_chats";
let CURRENT_USER = "";
let currentChatId = null;

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function fmtDate(ts) {
  const d = new Date(ts), now = new Date();
  if (d.toDateString() === now.toDateString())
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function getChats() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
function saveChats(c) { localStorage.setItem(STORAGE_KEY, JSON.stringify(c)); }
function getChat(id) { return getChats()[id] || null; }
function saveChat(chat) { const c = getChats(); c[chat.id] = chat; saveChats(c); }
function deleteChat(id) { const c = getChats(); delete c[id]; saveChats(c); }

function renderSidebar() {
  const list = document.getElementById("history-list");
  list.innerHTML = "";
  const sorted = Object.values(getChats()).sort((a, b) => b.updatedAt - a.updatedAt);
  if (sorted.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#475569;font-size:12px;padding:20px;">No chats yet.</div>';
    return;
  }
  sorted.forEach(chat => {
    const item = document.createElement("div");
    item.className = "history-item" + (chat.id === currentChatId ? " active" : "");

    const title = document.createElement("span");
    title.className = "history-title";
    title.textContent = chat.title || "New chat";

    const date = document.createElement("span");
    date.className = "history-date";
    date.textContent = fmtDate(chat.updatedAt);

    const del = document.createElement("button");
    del.className = "del-btn";
    del.textContent = "✕";
    del.onclick = (e) => {
      e.stopPropagation();
      if (confirm("Delete this chat?")) {
        deleteChat(chat.id);
        if (currentChatId === chat.id) {
          currentChatId = null;
          document.getElementById("messages").innerHTML = "";
          document.getElementById("chat-title-display").textContent = "";
        }
        renderSidebar();
      }
    };

    item.append(title, date, del);
    item.onclick = () => loadChat(chat.id);
    list.appendChild(item);
  });
}

function addMessageDOM(text, role, scroll = true) {
  const container = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "msg " + (role === "user" ? "user" : "bot");
  div.innerText = text;
  if (role === "bot") {
    const speak = document.createElement("button");
    speak.innerText = "🔊";
    speak.onclick = () => tts(text);
    const copy = document.createElement("button");
    copy.innerText = "📋";
    copy.onclick = () => navigator.clipboard.writeText(text);
    div.append(speak, copy);
  }
  container.appendChild(div);
  if (scroll) container.scrollTop = container.scrollHeight;
  return div;
}

function renderMessages(messages) {
  document.getElementById("messages").innerHTML = "";
  messages.forEach(m => addMessageDOM(m.text, m.role, false));
}

function newChat() {
  const id = uid();
  saveChat({ id, title: "New chat", messages: [], createdAt: Date.now(), updatedAt: Date.now() });
  loadChat(id);
  document.getElementById("input").focus();
}

function loadChat(id) {
  currentChatId = id;
  const chat = getChat(id);
  if (!chat) return;
  renderMessages(chat.messages);
  document.getElementById("chat-title-display").textContent = chat.title !== "New chat" ? chat.title : "";
  renderSidebar();
  const c = document.getElementById("messages");
  setTimeout(() => c.scrollTop = c.scrollHeight, 50);
}

function addToCurrentChat(text, role) {
  if (!currentChatId) return;
  const chat = getChat(currentChatId);
  if (!chat) return;
  chat.messages.push({ text, role, ts: Date.now() });
  chat.updatedAt = Date.now();
  if (role === "user" && chat.title === "New chat" && chat.messages.filter(m => m.role === "user").length === 1) {
    chat.title = text.slice(0, 40) + (text.length > 40 ? "…" : "");
    document.getElementById("chat-title-display").textContent = chat.title;
  }
  saveChat(chat);
  renderSidebar();
}

async function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text || !currentChatId) return;
  addMessageDOM(text, "user");
  addToCurrentChat(text, "user");
  input.value = "";
  const typing = addMessageDOM("Typing…", "bot");
  try {
    const r = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
     body: JSON.stringify({
  message: text
})
    });       
    const d = await r.json();
    typing.remove();
    addMessageDOM(d.reply, "bot");
    addToCurrentChat(d.reply, "bot");
  } catch {
    typing.remove();
    addMessageDOM("❌ Server error", "bot");
  }
}

function tts(text) {
  speechSynthesis.cancel();
  speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

document.addEventListener("DOMContentLoaded", () => {
  async function checkGoogleUser() {

  const res = await fetch("/me");
  const user = await res.json();

  if (user) {

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "flex";

  CURRENT_USER = user.displayName;
    
const res2 = await fetch("/history");
const history = await res2.json();

console.log("User history:", history);

  renderSidebar();

  const chats = Object.values(getChats())
    .sort((a, b) => b.updatedAt - a.updatedAt);

  if (chats.length > 0) {
    loadChat(chats[0].id);
  } else {
    newChat();
  }
}
}

checkGoogleUser();
  const USER = "admin", PASS = "Pranavam21@";

  document.getElementById("loginBtn").onclick = () => {
    if (user.value === USER && pass.value === PASS) {
      CURRENT_USER = user.value;
      document.getElementById("login").style.display = "none";
      document.getElementById("app").style.display = "flex";
      renderSidebar();
      const chats = Object.values(getChats()).sort((a, b) => b.updatedAt - a.updatedAt);
      if (chats.length > 0) loadChat(chats[0].id);
      else newChat();
    } else {
      document.getElementById("error").innerText = "❌ Wrong login";
    }
  };

  document.getElementById("newChatBtn").onclick = newChat;
  document.getElementById("send").onclick = sendMessage;
  document.getElementById("input").addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });

  document.getElementById("clearBtn").onclick = () => {
    if (!currentChatId) return;
    if (confirm("Clear this chat?")) {
      const chat = getChat(currentChatId);
      if (chat) {
        chat.messages = []; chat.title = "New chat"; chat.updatedAt = Date.now();
        saveChat(chat);
        document.getElementById("messages").innerHTML = "";
        document.getElementById("chat-title-display").textContent = "";
        renderSidebar();
      }
    }
  };

  document.getElementById("clearAllBtn").onclick = () => {
    if (confirm("Delete ALL history?")) {
      localStorage.removeItem(STORAGE_KEY);
      currentChatId = null;
      document.getElementById("messages").innerHTML = "";
      document.getElementById("chat-title-display").textContent = "";
      renderSidebar();
      newChat();
    }
  };

  document.getElementById("uploadBtn").onclick = () => document.getElementById("fileInput").click();
  document.getElementById("fileInput").onchange = async () => {
    const file = document.getElementById("fileInput").files[0];
    if (!file || !currentChatId) return;
    addMessageDOM("📤 Uploading: " + file.name, "user");
    addToCurrentChat("📤 Uploading: " + file.name, "user");
    const formData = new FormData();
    formData.append("file", file);
    try {
      const res = await fetch("/upload", { method: "POST", body: formData });
      const data = await res.json();
     const msg =
data.success
? "📄 File loaded successfully. Ask me questions about it."
: "❌ Upload failed";
      addMessageDOM(msg, "bot");
      addToCurrentChat(msg, "bot");
    } catch {
      addMessageDOM("❌ Upload failed", "bot");
    }
  };

  try {
    const rec = new (SpeechRecognition || webkitSpeechRecognition)();
    rec.lang = "en-US";
    document.getElementById("mic").onclick = () => rec.start();
    rec.onresult = e => { document.getElementById("input").value = e.results[0][0].transcript; };
  } catch {
    document.getElementById("mic").style.display = "none";
  }
});
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js")
      .then(() => console.log("✅ SW registered"))
      .catch(err => console.log("❌ SW failed", err));
  });
}
</script>

</body>
</html>
