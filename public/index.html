<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00054c">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Spark AI</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    /* ===== THEMES ===== */
    :root {
      --bg:#00054c; --card:#020617; --user:#2563eb; --bot:#1e293b; --accent:#3b82f6;
      --sb-bg:#010b2e; --sb-border:#0f2060; --sb-text:#cbd5e1; --sb-hover:#0f2060; --sb-active:#1e3a8a;
      --main-bg:#f8fafc; --msg-bg:#ffffff; --footer-bg:#ffffff; --footer-border:#e2e8f0;
      --input-bg:#f8fafc; --input-border:#e2e8f0; --input-color:#0f172a;
      --header-grad:linear-gradient(90deg,#00054c,#020617);
      --empty-color:#94a3b8; --scrollbar:#1e3a8a;
    }
    html[data-theme="white"] {
      --bg:#f0f4f8; --card:#ffffff; --user:#2563eb; --bot:#e2e8f0; --accent:#2563eb;
      --sb-bg:#ffffff; --sb-border:#e2e8f0; --sb-text:#1e293b; --sb-hover:#f1f5f9; --sb-active:#dbeafe;
      --main-bg:#f8fafc; --msg-bg:#ffffff; --footer-bg:#ffffff; --footer-border:#e2e8f0;
      --input-bg:#f1f5f9; --input-border:#e2e8f0; --input-color:#0f172a;
      --header-grad:linear-gradient(90deg,#1e40af,#2563eb);
      --empty-color:#64748b; --scrollbar:#bfdbfe;
    }
    html[data-theme="dark"] {
      --bg:#0a0a0a; --card:#111111; --user:#2563eb; --bot:#1c1c1e; --accent:#3b82f6;
      --sb-bg:#111111; --sb-border:#222222; --sb-text:#a1a1aa; --sb-hover:#1c1c1e; --sb-active:#27272a;
      --main-bg:#0d0d0d; --msg-bg:#111111; --footer-bg:#111111; --footer-border:#222222;
      --input-bg:#1c1c1e; --input-border:#333333; --input-color:#e4e4e7;
      --header-grad:linear-gradient(90deg,#0a0a0a,#111111);
      --empty-color:#52525b; --scrollbar:#27272a;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:Arial,Helvetica,sans-serif;
      background:var(--bg); display:flex;
      justify-content:center; align-items:center;
      height:100vh; height:100dvh; color:#fff; overflow:hidden;
      transition: background .3s;
    }

    /* ===== LOGIN ===== */
    #login {
      background:var(--card); padding:32px 26px; width:340px;
      max-width:93vw; border-radius:16px; text-align:center;
      box-shadow:0 0 30px rgba(0,0,0,.6);
    }
    #login h2 { margin-bottom:6px; font-size:24px; }
    #login .subtitle { color:#64748b; font-size:13px; margin-bottom:22px; }
    #login input {
      width:100%; padding:11px 13px; margin:6px 0;
      border-radius:9px; border:none; outline:none;
      background:#0f172a; color:#fff; font-size:14px;
    }
    html[data-theme="white"] #login input { background:#f1f5f9; color:#0f172a; }
    #login input::placeholder { color:#475569; }
    #login .login-btn {
      width:100%; padding:11px; margin-top:6px;
      background:var(--accent); color:white; border:none;
      border-radius:9px; cursor:pointer; font-size:15px; font-weight:bold;
    }
    .divider { display:flex; align-items:center; gap:10px; margin:14px 0; color:#334155; font-size:12px; }
    .divider::before,.divider::after { content:""; flex:1; height:1px; background:#1e293b; }
    #googleBtn {
      width:100%; padding:11px; background:#fff; color:#1e293b;
      border:none; border-radius:9px; cursor:pointer;
      font-size:14px; font-weight:bold; display:flex;
      align-items:center; justify-content:center; gap:8px;
    }
    #googleBtn:hover { background:#f1f5f9; }
    #error { color:#f87171; font-size:12px; margin-top:10px; min-height:16px; }

    /* ===== APP ===== */
    #app {
      display:none; width:97vw; max-width:1060px;
      height:95vh; height:95dvh; border-radius:18px;
      overflow:hidden; flex-direction:row;
      box-shadow:0 0 40px rgba(0,0,0,.8); position:relative;
    }
    html[data-theme="white"] #app, html[data-theme="dark"] #app { box-shadow:0 0 40px rgba(0,0,0,.4); }

    /* ===== SIDEBAR ===== */
    #sidebar {
      width:280px; background:var(--sb-bg);
      display:flex; flex-direction:column;
      border-right:1px solid var(--sb-border); flex-shrink:0;
      transition:transform 0.28s cubic-bezier(.4,0,.2,1); z-index:20;
    }
    #sb-topbar {
      display:flex; align-items:center; justify-content:space-between;
      padding:13px 14px 10px; border-bottom:1px solid var(--sb-border); flex-shrink:0;
    }
    #sb-brand { font-size:15px; font-weight:bold; color:#fff; display:flex; align-items:center; gap:6px; }
    html[data-theme="white"] #sb-brand { color:#1e293b; }
    html[data-theme="dark"] #sb-brand { color:#e4e4e7; }
    #sb-icons { display:flex; gap:4px; align-items:center; }
    .sb-icon-btn {
      background:none; border:none; color:var(--sb-text); cursor:pointer;
      font-size:17px; padding:5px 6px; border-radius:7px; line-height:1;
    }
    .sb-icon-btn:hover { background:var(--sb-hover); color:#fff; }
    html[data-theme="white"] .sb-icon-btn:hover { color:#1e293b; }
    #sb-search-bar {
      display:none; padding:8px 12px; border-bottom:1px solid var(--sb-border); flex-shrink:0;
    }
    #sb-search-bar.show { display:block; }
    #searchBox {
      width:100%; padding:8px 11px; border-radius:9px;
      border:1.5px solid var(--sb-border); background:var(--input-bg); color:var(--input-color);
      font-size:13px; outline:none;
    }
    #searchBox:focus { border-color:var(--accent); }
    #searchBox::placeholder { color:#64748b; }
    #sb-nav { flex:1; overflow-y:auto; padding:8px 8px 4px; -webkit-overflow-scrolling:touch; }
    #sb-nav::-webkit-scrollbar { width:6px; }
    #sb-nav::-webkit-scrollbar-track { background:transparent; }
    #sb-nav::-webkit-scrollbar-thumb { background:var(--scrollbar); border-radius:6px; }
    #newChatBtn {
      width:100%; padding:10px 14px; margin-bottom:4px;
      background:var(--accent); border:none; color:white;
      border-radius:10px; cursor:pointer; font-size:13px; font-weight:bold;
      display:flex; align-items:center; gap:8px; text-align:left;
    }
    #newChatBtn:hover { filter:brightness(1.1); }
    .nav-section { margin-bottom:2px; }
    .nav-section-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:8px 10px; border-radius:9px; cursor:pointer;
      color:var(--sb-text); font-size:13px; font-weight:600;
      transition:background .15s; user-select:none;
    }
    .nav-section-header:hover { background:var(--sb-hover); }
    .nav-section-header .nav-left { display:flex; align-items:center; gap:8px; }
    .nav-section-header .nav-arrow { font-size:10px; transition:transform .2s; }
    .nav-section-header.open .nav-arrow { transform:rotate(90deg); }
    .nav-section-body { display:none; padding:2px 0 4px; }
    .nav-section-body.open { display:block; }
    .sb-item {
      display:flex; align-items:center; gap:6px;
      padding:8px 10px 8px 22px; border-radius:9px; cursor:pointer;
      font-size:13px; color:var(--sb-text); margin-bottom:1px;
      transition:background .15s; position:relative;
    }
    .sb-item:hover { background:var(--sb-hover); }
    .sb-item.active { background:var(--sb-active); color:#fff; }
    html[data-theme="white"] .sb-item.active { color:#1e3a8a; }
    .sb-item .item-title { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sb-item .item-date { font-size:10px; color:#475569; white-space:nowrap; }
    .sb-item .more-btn {
      background:none; border:none; color:#475569; cursor:pointer;
      font-size:15px; padding:0 3px; flex-shrink:0; border-radius:4px; line-height:1; opacity:0;
    }
    .sb-item:hover .more-btn { opacity:1; }
    .sb-item .more-btn:hover { color:#e2e8f0; background:rgba(255,255,255,.1); }
    .sb-item .pin-icon { font-size:10px; color:#f59e0b; flex-shrink:0; }
    .proj-arrow { font-size:10px; color:#475569; flex-shrink:0; transition:transform .2s; }
    .proj-arrow.open { transform:rotate(90deg); }
    .proj-chats { display:none; }
    .proj-chats.open { display:block; }
    .proj-chat-item {
      display:flex; align-items:center; gap:6px;
      padding:7px 10px 7px 34px; border-radius:9px; cursor:pointer;
      font-size:12px; color:var(--sb-text); margin-bottom:1px;
      transition:background .15s;
    }
    .proj-chat-item:hover { background:var(--sb-hover); }
    .proj-chat-item.active { background:var(--sb-active); color:#fff; }
    .proj-chat-item .item-title { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .proj-chat-item .more-btn { background:none; border:none; color:#475569; cursor:pointer; font-size:14px; padding:0 3px; flex-shrink:0; border-radius:4px; opacity:0; }
    .proj-chat-item:hover .more-btn { opacity:1; }
    .section-label { padding:6px 10px 2px 22px; font-size:10px; color:#475569; text-transform:uppercase; letter-spacing:.06em; }
    #sb-user-area {
      border-top:1px solid var(--sb-border); padding:10px 12px; flex-shrink:0;
      display:flex; align-items:center; gap:10px; cursor:pointer; position:relative;
    }
    #sb-user-area:hover { background:rgba(255,255,255,.04); }
    html[data-theme="white"] #sb-user-area:hover { background:#f1f5f9; }
    #sbAvatar {
      width:34px; height:34px; border-radius:50%; border:2px solid var(--accent);
      background:#1e3a8a; display:flex; align-items:center; justify-content:center;
      font-size:15px; color:#fff; flex-shrink:0; overflow:hidden;
    }
    #sbAvatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; display:none; }
    #sbUserName { flex:1; font-size:13px; font-weight:600; color:var(--sb-text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    #sbUserChevron { font-size:11px; color:#475569; }
    #userPopup {
      display:none; position:absolute; bottom:60px; left:10px; right:10px;
      background:#0f172a; border:1px solid #1e3a8a; border-radius:12px;
      box-shadow:0 -4px 24px rgba(0,0,0,.5); z-index:100; overflow:hidden;
    }
    html[data-theme="white"] #userPopup { background:#ffffff; border-color:#e2e8f0; box-shadow:0 -4px 20px rgba(0,0,0,.1); }
    html[data-theme="dark"] #userPopup { background:#1c1c1e; border-color:#333; }
    #userPopup.show { display:block; }
    .popup-profile { padding:14px; display:flex; align-items:center; gap:10px; border-bottom:1px solid #1e3a8a; }
    html[data-theme="white"] .popup-profile { border-color:#e2e8f0; }
    .popup-avatar { width:40px; height:40px; border-radius:50%; border:2px solid var(--accent); background:#1e3a8a; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; overflow:hidden; }
    .popup-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; display:none; }
    .popup-user-info { flex:1; min-width:0; }
    .popup-name { font-size:13px; font-weight:bold; color:#e2e8f0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    html[data-theme="white"] .popup-name { color:#1e293b; }
    .popup-email { font-size:11px; color:#64748b; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
    .popup-item { padding:11px 14px; font-size:13px; color:#cbd5e1; cursor:pointer; display:flex; align-items:center; gap:8px; transition:background .15s; }
    html[data-theme="white"] .popup-item { color:#374151; }
    .popup-item:hover { background:#1e293b; }
    html[data-theme="white"] .popup-item:hover { background:#f1f5f9; }
    .popup-item.danger { color:#f87171; border-top:1px solid #1e3a8a; }
    html[data-theme="white"] .popup-item.danger { border-color:#e2e8f0; }

    #overlay { display:none; position:absolute; inset:0; background:rgba(0,0,0,.55); z-index:15; }

    .modal-wrap {
      display:none; position:absolute; inset:0;
      background:rgba(0,0,5,.72); z-index:60;
      align-items:center; justify-content:center;
    }
    .modal-wrap.show { display:flex; }
    .modal-box {
      background:#0f172a; border-radius:14px; padding:24px;
      width:480px; max-width:92vw;
      display:flex; flex-direction:column; gap:14px;
      box-shadow:0 0 40px rgba(0,0,0,.8);
    }
    html[data-theme="white"] .modal-box { background:#ffffff; }
    html[data-theme="dark"] .modal-box { background:#1c1c1e; }
    .modal-box h3 { color:#fff; font-size:16px; }
    html[data-theme="white"] .modal-box h3 { color:#1e293b; }
    .modal-box p { color:#94a3b8; font-size:13px; line-height:1.5; }
    .modal-box textarea, .modal-box input[type="text"] {
      width:100%; padding:11px 13px;
      background:#020617; color:#fff; border:1.5px solid #1e3a8a;
      border-radius:9px; font-size:13px; outline:none; font-family:inherit;
    }
    html[data-theme="white"] .modal-box textarea, html[data-theme="white"] .modal-box input[type="text"] { background:#f8fafc; color:#1e293b; border-color:#e2e8f0; }
    .modal-box textarea { min-height:120px; resize:vertical; line-height:1.5; }
    .modal-box textarea:focus, .modal-box input[type="text"]:focus { border-color:var(--accent); }
    .modal-actions { display:flex; gap:8px; justify-content:flex-end; }
    .modal-actions button { padding:9px 18px; border-radius:9px; border:none; cursor:pointer; font-size:13px; font-weight:bold; }
    .btn-cancel { background:#1e293b; color:#94a3b8; }
    html[data-theme="white"] .btn-cancel { background:#f1f5f9; color:#64748b; }
    .btn-primary { background:var(--accent); color:white; }
    .theme-row { display:flex; gap:10px; }
    .theme-opt {
      flex:1; padding:10px 8px; border-radius:10px; border:2px solid #1e3a8a;
      cursor:pointer; text-align:center; font-size:12px; font-weight:bold;
      transition:border-color .2s, background .2s; color:#94a3b8;
    }
    .theme-opt:hover { border-color:var(--accent); }
    .theme-opt.selected { border-color:var(--accent); background:rgba(59,130,246,.15); color:#fff; }
    html[data-theme="white"] .theme-opt { background:#f8fafc; color:#64748b; border-color:#e2e8f0; }
    html[data-theme="white"] .theme-opt.selected { background:#dbeafe; color:#1e40af; border-color:#3b82f6; }
    .theme-preview { width:100%; height:32px; border-radius:6px; margin-bottom:6px; }
    .preview-default { background:linear-gradient(135deg,#00054c 50%,#f8fafc 50%); }
    .preview-white { background:linear-gradient(135deg,#e2e8f0 50%,#ffffff 50%); }
    .preview-dark { background:linear-gradient(135deg,#111 50%,#1c1c1e 50%); }
    #main { flex:1; display:flex; flex-direction:column; background:var(--main-bg); min-width:0; }
    header {
      background:var(--header-grad);
      color:white; padding:10px 14px;
      display:flex; justify-content:space-between; align-items:center;
      font-weight:bold; flex-shrink:0; gap:8px;
    }
    .header-left { display:flex; align-items:center; gap:8px; min-width:0; }
    #menuBtn { background:none; border:none; color:white; font-size:22px; cursor:pointer; flex-shrink:0; padding:2px 4px; }
    .header-titles { display:flex; flex-direction:column; min-width:0; }
    .brand { font-size:15px; }
    #chat-title-display { font-size:11px; color:#94a3b8; font-weight:normal; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px; }
    .header-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }
    #headerAvatar {
      width:32px; height:32px; border-radius:50%; border:2px solid var(--accent);
      background:#1e3a8a; display:flex; align-items:center; justify-content:center;
      font-size:14px; cursor:pointer; overflow:hidden; flex-shrink:0;
    }
    #headerAvatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; display:none; }
    #messages {
      flex:1; overflow-y:auto; padding:12px 10px;
      display:flex; flex-direction:column; gap:8px;
      -webkit-overflow-scrolling:touch; background:var(--main-bg);
    }
    #messages::-webkit-scrollbar { width:6px; }
    #messages::-webkit-scrollbar-track { background:transparent; }
    #messages::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:6px; }
    html[data-theme="dark"] #messages::-webkit-scrollbar-thumb { background:#333; }
    .msg { padding:10px 13px; border-radius:14px; max-width:78%; font-size:14px; word-break:break-word; line-height:1.5; }
    .user { background:var(--user); color:white; margin-left:auto; border-bottom-right-radius:3px; }
    .bot { background:var(--bot); color:white; margin-right:auto; border-bottom-left-radius:3px; }
    html[data-theme="white"] .bot { color:#1e293b; }
    .msg-image { max-width:100%; border-radius:8px; margin-bottom:4px; display:block; cursor:pointer; }
    .typing-dots { display:flex; gap:4px; padding:4px 2px; align-items:center; }
    .typing-dots span { width:7px; height:7px; background:#94a3b8; border-radius:50%; animation:bounce 1.2s infinite; }
    .typing-dots span:nth-child(2) { animation-delay:.2s; }
    .typing-dots span:nth-child(3) { animation-delay:.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
    .bot-content { color:#e2e8f0; font-size:14px; line-height:1.6; }
    html[data-theme="white"] .bot-content { color:#1e293b; }
    .bot-content p { margin:0 0 8px; }
    .bot-content p:last-child { margin:0; }
    .bot-content h1,.bot-content h2,.bot-content h3 { color:#fff; margin:10px 0 5px; }
    html[data-theme="white"] .bot-content h1, html[data-theme="white"] .bot-content h2, html[data-theme="white"] .bot-content h3 { color:#1e293b; }
    .bot-content ul,.bot-content ol { padding-left:18px; margin:6px 0; }
    .bot-content li { margin:3px 0; }
    .bot-content a { color:#93c5fd; }
    .bot-content strong { color:#fff; }
    html[data-theme="white"] .bot-content strong { color:#111; }
    .bot-content blockquote { border-left:3px solid #3b82f6; margin:8px 0; padding:4px 12px; color:#94a3b8; background:rgba(255,255,255,.04); border-radius:4px; }
    .bot-content code { background:#0f172a; color:#7dd3fc; padding:1px 5px; border-radius:4px; font-size:12.5px; font-family:'Courier New',monospace; }
    html[data-theme="white"] .bot-content code { background:#f1f5f9; color:#0369a1; }
    .bot-content pre { background:#0d1117; border-radius:8px; margin:8px 0; overflow:hidden; }
    .code-header { display:flex; justify-content:space-between; align-items:center; padding:5px 12px; background:#161b22; border-bottom:1px solid #30363d; }
    .code-lang { font-size:11px; color:#7d8590; font-family:monospace; }
    .copy-code-btn { font-size:11px; padding:2px 8px; background:#21262d; color:#c9d1d9; border:1px solid #30363d; border-radius:5px; cursor:pointer; }
    .copy-code-btn:hover { background:#30363d; }
    .bot-content pre code { background:none; color:inherit; padding:12px; display:block; overflow-x:auto; font-size:12.5px; line-height:1.6; }
    .cursor::after { content:"▋"; animation:blink .7s infinite; color:#7dd3fc; margin-left:1px; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .msg-actions { display:flex; gap:4px; margin-top:8px; flex-wrap:wrap; }
    .msg-actions button { font-size:11px; padding:3px 8px; border:none; border-radius:6px; cursor:pointer; background:rgba(255,255,255,.13); color:#e2e8f0; }
    html[data-theme="white"] .msg-actions button { background:rgba(0,0,0,.07); color:#374151; }
    .msg-actions button:hover { background:rgba(255,255,255,.23); }
    .msg-actions button.thumbed-up { background:#16a34a44; color:#4ade80; }
    .msg-actions button.thumbed-down { background:#dc262644; color:#f87171; }
    #empty-hint { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--empty-color); gap:10px; text-align:center; padding:20px; }
    #empty-hint .icon { font-size:42px; }
    #empty-hint h3 { font-size:16px; }
    #empty-hint p { font-size:13px; }
    footer { display:flex; gap:6px; padding:8px 10px; border-top:1px solid var(--footer-border); background:var(--footer-bg); flex-shrink:0; align-items:center; }
    footer input[type="text"] { flex:1; padding:10px 13px; border-radius:22px; border:1.5px solid var(--input-border); outline:none; font-size:14px; color:var(--input-color); background:var(--input-bg); min-width:0; }
    footer input[type="text"]:focus { border-color:var(--accent); }
    .icon-btn { width:40px; height:40px; background:var(--accent); color:white; border:none; border-radius:50%; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .icon-btn:active { filter:brightness(.9); }
    .icon-btn.ghost { background:var(--input-bg); color:#64748b; border:1px solid var(--input-border); }
    .ctx-menu { position:fixed; background:#0f172a; border:1px solid #1e3a8a; border-radius:9px; box-shadow:0 8px 24px rgba(0,0,0,.5); z-index:300; overflow:hidden; min-width:160px; }
